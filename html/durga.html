<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            color: rgb(244, 239, 239);
            background-color: black;
            font-family: 'Times New Roman', Times, serif;
        }
        #main{
            margin: 20px;
            background: rgb(7, 107, 137);
            padding: 20px;
            justify-content: center;
            align-items: center;
        }
        #input{
            padding: 10px;
        }
        
    </style>
</head>
<body>
    <div id="main">
        <form onsubmit="mainContainer">
            <input type="number" id="userIdInput" value="1" min="1" max="10">
            <button onclick="handleclick(event)">Search</button>
        </form>
    </div>
    <div id="output"></div>
    <script>
       const fetchData = async(userIdInput)=>{
        const output = document.getElementById("output")
        const data = await fetch(`https://jsonplaceholder.typicode.com/users/${userIdInput}`);
        const reponse = await data.json();
        console.log(reponse)
        output.innerHTML =`
        ${reponse.name}`
       }
       const handleclick = (e)=>{
        e.preventDefault()
        const userIdInput = document.getElementById("userIdInput").value;
        fetchData(userIdInput)
       }
       
        
    </script>
</body>
</html>
